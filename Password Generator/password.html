<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Random Password Generator</h2>

        <div class="output-box">
            <input type="text" id="password" readonly placeholder="Your password appears here">
            <button id="copyBtn">Copy</button>
        </div>

        <div class="settings">
            <label>Password Length: <span id="lengthValue">12</span></label>
            <input type="range" id="length" min="4" max="32" value="12">
        </div>

        <div class="checkboxes">
            <label><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>
            <label><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label>
            <label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
            <label><input type="checkbox" id="symbols" checked> Symbols (!@#$%)</label>
        </div>

        <button id="generateBtn" class="generate">Generate Password</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
